---
layout: default
title: "Contact Us"
permalink: /contact/
---

<div class="container" style="max-width: 1000px; padding-top: 50px;">
<div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 50px; align-items: start;">    
    <div>
      <h1 style="font-family: var(--font-display); font-size: 52px; margin-bottom: 20px; color: var(--text);">Contact Us</h1>
      <p style="color: var(--text2); font-size: 18px; margin-bottom: 40px; line-height: 1.8;">Reach out to our global editorial team during this 2026 market expansion. We welcome inquiries from institutional investors, press, and partners.</p>
    </div>

    <div style="background: var(--bg2); padding: 40px; border-radius: var(--radius); border: 1px solid var(--border);">
      
      <form action="https://formsubmit.co/fefb3b42870c35b50d9aa52c0ca01810" method="POST">
        
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_next" value="https://themacroedge.online/contact/">

        <div style="margin-bottom: 20px;">
          <label style="display: block; font-weight: 600; font-size: 14px; margin-bottom: 8px; color: var(--text);">Full Name</label>
          <input type="text" name="name" required placeholder="John Doe" style="width: 100%; padding: 15px; border: 1px solid var(--border); border-radius: 8px; font-family: var(--font-main); outline: none;">
        </div>

        <div style="margin-bottom: 20px;">
          <label style="display: block; font-weight: 600; font-size: 14px; margin-bottom: 8px; color: var(--text);">Work Email</label>
          <input type="email" name="email" required placeholder="name@company.com" style="width: 100%; padding: 15px; border: 1px solid var(--border); border-radius: 8px; font-family: var(--font-main); outline: none;">
        </div>

        <div style="margin-bottom: 25px;">
          <label style="display: block; font-weight: 600; font-size: 14px; margin-bottom: 8px; color: var(--text);">Message Content</label>
          <textarea name="message" rows="5" required placeholder="How can we assist you?" style="width: 100%; padding: 15px; border: 1px solid var(--border); border-radius: 8px; font-family: var(--font-main); outline: none; resize: vertical;"></textarea>
        </div>

        <button type="submit" style="width: 100%; padding: 18px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s;">Send Message &rarr;</button>
      </form>
    </div>

  </div>
</div>
