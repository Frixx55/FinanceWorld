<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script type="text/javascript">
        // 1. Capturamos la dirección que Google intentó visitar
        var currentPath = window.location.pathname;
        
        // 2. La guardamos en la memoria del navegador
        sessionStorage.setItem('redirectURL', currentPath);
        
        // 3. Saltamos inmediatamente a la Home (index.html)
        // La Home leerá esa memoria y cargará el artículo por ti
        window.location.replace('/');
    </script>
</head>
<body>
    <p>Redirecting to report...</p>
</body>
</html>
