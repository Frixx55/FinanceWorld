---
layout: default
title: "DeFi"
permalink: /defi/
---
<div class="container" style="padding-top: 40px;">
  <div class="section-header">
    <h1 class="section-title" style="font-size: 42px;">DeFi</h1>
    <p style="color: var(--text3); font-size: 18px; margin-top: 10px;">Decentralized finance protocols, smart contracts, and Web3 yields.</p>
  </div>

  <div class="articles-grid">
    <!-- Este bucle filtra solo los artículos de "DeFi" -->
    {% for post in site.posts %}
      {% if post.category == 'DeFi' %}
      <a href="{{ post.url | relative_url }}" class="article-card">
        <img src="{{ post.image }}" alt="{{ post.title }}">
        <div class="article-card-body">
          <span class="tag">{{ post.category }}</span>
          <h3 style="font-size: 22px; line-height: 1.3; margin-bottom: 15px; color: var(--text);">{{ post.title }}</h3>
          <div style="font-size: 13px; color: var(--text3); font-weight: 500; margin-top: auto;">
            {{ post.date | date: "%B %d, %Y" }}
          </div>
        </div>
      </a>
      {% endif %}
    {% endfor %}
  </div>
</div>
